<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll("code.language-mermaid").forEach((block) => {

    const pre = block.parentElement;

    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = block.textContent;

    pre.replaceWith(div);
  });

  mermaid.initialize({
    startOnLoad: false
  });

  mermaid.run();
});
</script>

<style>
/* Code blocks più compatti e leggibili */
pre, code {
  font-family: Consolas, "Fira Code", "JetBrains Mono", monospace;
  font-size: 0.85rem;
  line-height: 1.25;
  white-space: pre-wrap;      /* va a capo automaticamente */
  word-break: break-word;     /* spezza parole lunghissime */
}

/* Contenitore <pre> più compatto */
pre {
  padding: 0.5rem 0.7rem;
  margin: 0.8rem 0;
  overflow-x: auto;           /* scroll solo se necessario */
  background: #f6f8fa;        /* stile GitHub-like */
  border: 1px solid #e1e4e8;
  border-radius: 6px;
}

/* Inline code */
code {
  background: #f6f8fa;
  padding: 0.1rem 0.3rem;
  border-radius: 4px;
}

/* Mermaid */
.mermaid {
  background: transparent;
  border: none;
  padding: 0;
  margin: 1rem 0;
}

.mermaid svg {
  max-width: 100%;
  height: auto;
}

</style>
